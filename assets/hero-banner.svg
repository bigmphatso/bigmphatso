<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A1220"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8">
        <animate attributeName="stop-color" values="#38BDF8;#A855F7;#F472B6;#38BDF8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#A855F7">
        <animate attributeName="stop-color" values="#A855F7;#F472B6;#38BDF8;#A855F7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F472B6">
        <animate attributeName="stop-color" values="#F472B6;#38BDF8;#A855F7;#F472B6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg)"/>
  <rect width="900" height="260" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="40 40" dur="4s" repeatCount="indefinite"/>
  </rect>

  <circle cx="450" cy="130" r="180" fill="url(#glow)">
    <animate attributeName="r" values="160;190;160" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="90" cy="45" r="2.5" fill="#38BDF8">
    <animate attributeName="cy" values="45;35;45" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="810" cy="60" r="3" fill="#A855F7">
    <animate attributeName="cy" values="60;72;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="200" r="2" fill="#F472B6">
    <animate attributeName="cy" values="200;188;200" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="210" r="2.5" fill="#38BDF8">
    <animate attributeName="cy" values="210;222;210" dur="4.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4.4s" repeatCount="indefinite"/>
  </circle>

  <text x="450" y="120" font-family="Fira Code, monospace" font-size="46" font-weight="700" fill="url(#textGrad)" text-anchor="middle">
    MPHATSO MISINDE
  </text>

  <text x="450" y="160" font-family="Fira Code, monospace" font-size="17" fill="#94A3B8" text-anchor="middle">
    <tspan fill="#38BDF8">const</tspan> builder = { code, security, ai, iot }<tspan id="cursor">_</tspan>
    <animate xlink:href="#cursor" attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="195" font-family="Fira Code, monospace" font-size="13" fill="#475569" text-anchor="middle" letter-spacing="3">
    MALAWI · FULL-STACK · CYBERSECURITY · AI · IOT
  </text>

  <line x1="330" y1="215" x2="570" y2="215" stroke="#1E293B" stroke-width="1"/>
  <circle cx="330" cy="215" r="3" fill="#38BDF8">
    <animate attributeName="cx" values="330;570;330" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
